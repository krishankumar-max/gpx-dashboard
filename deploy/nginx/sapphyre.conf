# /etc/nginx/sites-available/sapphyre
# Symlink to enable:
#   sudo ln -s /etc/nginx/sites-available/sapphyre /etc/nginx/sites-enabled/sapphyre
#   sudo nginx -t && sudo systemctl reload nginx

# ── Rate limiting ─────────────────────────────────────────────────────────────
# Internal dashboard — light rate limiting is sufficient.
# Increase burst if team is large.
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=static:10m rate=100r/s;

# ── Upstream ──────────────────────────────────────────────────────────────────
upstream sapphyre_app {
    server 127.0.0.1:5001 fail_timeout=0;
    keepalive 4;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name your-domain.com www.your-domain.com;

    # Let's Encrypt ACME challenge (certbot uses this path)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name your-domain.com www.your-domain.com;

    # ── TLS ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_tickets off;

    # HSTS — 1 year; enable after confirming HTTPS works
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"           always;
    add_header X-Content-Type-Options    "nosniff"              always;
    add_header X-XSS-Protection          "1; mode=block"        always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self';" always;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/sapphyre_access.log;
    error_log  /var/log/nginx/sapphyre_error.log warn;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss text/javascript;

    # ── Static files (served directly by Nginx — never touches Gunicorn) ─────
    location /static/ {
        alias /opt/sapphyre/frontend/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        limit_req zone=static burst=50 nodelay;
        access_log off;
    }

    # ── API endpoints ─────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass         http://sapphyre_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection      "";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;   # sync calls can take minutes
        proxy_send_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── All other requests → Gunicorn ─────────────────────────────────────────
    location / {
        limit_req zone=api burst=20 nodelay;
        proxy_pass         http://sapphyre_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection      "";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Health check (Nginx itself responds — no Gunicorn needed) ────────────
    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ── Block hidden files ────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
